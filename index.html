<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="lib/fontawesome-free-6.1.1-web/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <div class="container-fluid">
      <!-- nav bar -->
      <nav class="row fixed-top d-flex flex-lg-row-reverse pt-3">
        <div class="col-lg-7 col-12 px-lg-5">
          <div class="row d-flex flex-lg-row flex-row-reverse">
            <!-- nav link -->
            <div class="col d-lg-flex align-items-center d-none">
              <a
                class="next-link btn text-uppercase fw-bold bg-black-hover"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Go to project page"
                data-bs-toggle="tooltip"
                href="#"
                >project</a
              >
              <a
                class="next-link btn text-uppercase fw-bold bg-black-hover"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Go to about me page"
                href="#"
                >aboutme</a
              >
              <a
                class="next-link btn text-uppercase fw-bold bg-black-hover"
                data-bs-toggle="tooltip"
                data-bs-placement="bottom"
                title="Go to contact page"
                href="#"
                >Contact</a
              >
            </div>
            <!-- logo img -->
            <div class="col text-lg-end text-center">
              <a href="#">
                <img
                  src="./img/TIME LOGO_IZ LOGO-01.svg"
                  alt="user logo"
                  width="150px"
                />
              </a>
            </div>
          </div>
        </div>
      </nav>

      <div class="row h-100vh bg-custom-tile">
        <div class="col-lg-5 bg-warning px-0">
          <div class="user-portrait"></div>
        </div>
        <div class="col-lg-7">
          <div class="p-lg-5 p-0"></div>
          <div class="p-lg-5 p-0"></div>
          <div class="container-fluid mt-5 ps-lg-5">
            <div
              class="fs-1 fw-bold my-3 text-uppercase text-center text-sm-start d-inline-block"
              id="cur-dot-moti"
            >
              A positive mindset <br class="d-none d-lg-block" />
              Brings positive things.
            </div>
            <br />
            <a
              href="#"
              class="btn btn-dark d-block d-lg-inline-block btn-lg mt-4"
              id="next-link-action"
              >ABOUTME</a
            >
            <a
              href="#"
              class="btn btn-dark d-block d-lg-none d-lg-inline-block btn-lg mt-4"
              id="next-link-action"
              >SEE PROJECT</a
            >
            <a
              href="#"
              class="btn btn-dark d-block d-lg-none d-lg-inline-block btn-lg mt-4"
              id="next-link-action"
              >CONTACT ME</a
            >
          </div>
          <nav class="row fixed-bottom  d-flex flex-row-reverse mt-3 mt-lg-0" id="social-link">
            <div class="col-lg-7 col-12">
              <div class="d-flex justify-content-center py-3">
                <a
                  class="text-decoration-none text-primary px-2"
                  href="#"
                  data-bs-toggle="tooltip"
                  data-bs-placement="top"
                  title="FACEBOOK"
                  data-bs-toggle="tooltip"
                  ><i class="fa-brands fa-3x fa-facebook"></i
                ></a>
                <a
                  class="text-decoration-none text-danger px-2"
                  href="#"
                  data-bs-toggle="tooltip"
                  data-bs-placement="top"
                  title="PINTEREST"
                  data-bs-toggle="tooltip"
                  ><i class="fa-brands fa-3x fa-pinterest"></i
                ></a>
                <a
                  class="text-decoration-none text-dark px-2"
                  href="#"
                  data-bs-toggle="tooltip"
                  data-bs-placement="top"
                  title="GITHUB"
                  data-bs-toggle="tooltip"
                  ><i class="fa-brands fa-3x fa-github"></i
                ></a>
              </div>
            </div>
          </nav>
          <div class="p-5 p-lg-0"></div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
    <!-- or create instance manually to provide custom options -->
    <script src="js/bs.js"></script>
    <script src="./lib/curDot/window.curDot.min.js"></script>
    <script src="./js/cursor.js"></script>
  </body>
</html>
